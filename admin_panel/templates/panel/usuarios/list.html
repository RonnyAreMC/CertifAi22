{% extends "panel/base.html" %}

{% block title %}Usuarios - Admin{% endblock %}
{% block page_title %}Usuarios Administradores{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-3">
                <span class="p-2 bg-unemi-blue/10 rounded-lg">
                    <i class="fas fa-users-cog text-unemi-blue"></i>
                </span>
                Usuarios Administradores
            </h1>
            <p class="text-sm text-gray-500 mt-1">Gestiona los accesos administrativos y recupera claves</p>
        </div>
        <div class="px-4 py-2 bg-gray-100 dark:bg-white/5 rounded-xl border border-gray-200 dark:border-white/10">
            <span class="text-xs text-gray-500 uppercase font-bold tracking-wider mr-2">Total</span>
            <span id="stat-total" class="text-lg font-bold text-unemi-blue">—</span>
        </div>
    </div>

    <!-- Buscador -->
    <div class="mb-6">
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <i class="fa-solid fa-magnifying-glass text-gray-400 group-focus-within:text-unemi-orange transition-colors"></i>
            </div>
            <input id="search-input" type="text" placeholder="Buscar por nombre o correo..."
                class="w-full pl-11 pr-4 py-3 bg-white dark:bg-[#1a2b4d] border border-gray-200 dark:border-white/10 rounded-2xl text-sm text-gray-800 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-unemi-orange focus:border-transparent transition-all shadow-sm">
        </div>
    </div>

    <div class="bg-white dark:bg-[#1a2b4d] rounded-2xl shadow-sm border border-gray-100 dark:border-white/10 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 dark:bg-black/20 border-b border-gray-200 dark:border-white/10">
                        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-widest">Nombre</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-widest text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="users-tbody" class="divide-y divide-gray-100 dark:divide-white/5">
                    <tr><td colspan="2" class="px-6 py-12 text-center text-gray-500">
                        <i class="fa-solid fa-spinner fa-spin mr-2"></i> Cargando…
                    </td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';

function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderRow(u) {
    const fullName = (`${u.first_name || ''} ${u.last_name || ''}`).trim() || u.username;
    const initials = ((u.first_name?.[0] || '') + (u.last_name?.[0] || '')).toUpperCase() || (u.username?.[0] || '?').toUpperCase();
    const rolBadge = u.rol === 'superadmin'
        ? 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300'
        : 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300';
    return `
    <tr class="hover:bg-gray-50/50 dark:hover:bg-white/5 transition-colors">
        <td class="px-6 py-4">
            <div class="flex items-center gap-4">
                <div class="h-10 w-10 rounded-full bg-unemi-blue/10 dark:bg-unemi-blue/20 flex items-center justify-center text-unemi-blue font-bold text-sm flex-shrink-0">
                    ${esc(initials)}
                </div>
                <div>
                    <p class="text-sm font-bold text-gray-900 dark:text-white">${esc(fullName)}</p>
                    <p class="text-xs text-gray-500 mb-1">${esc(u.email)}</p>
                    <span class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-tighter ${rolBadge}">${esc(u.rol_display || u.rol)}</span>
                </div>
            </div>
        </td>
        <td class="px-6 py-4 text-center">
            <button onclick="confirmReset(${u.id}, '${esc(fullName).replace(/'/g, '&apos;')}')" class="p-2.5 bg-unemi-orange/10 hover:bg-unemi-orange/20 text-unemi-orange rounded-xl transition-all" title="Resetear Clave">
                <i class="fa-solid fa-key"></i>
            </button>
        </td>
    </tr>`;
}

async function loadUsers(query = '') {
    const tbody = document.getElementById('users-tbody');
    try {
        const url = '/api/v1/admin/users/' + (query ? `?search=${encodeURIComponent(query)}` : '');
        const res = await fetch(url, { credentials: 'same-origin' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const users = (data.results || data).filter(u => u.rol === 'admin' || u.rol === 'superadmin');
        document.getElementById('stat-total').textContent = users.length;

        if (users.length === 0) {
            tbody.innerHTML = `
                <tr><td colspan="2" class="px-6 py-12 text-center">
                    <div class="w-16 h-16 bg-gray-50 dark:bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-users-slash text-2xl text-gray-300"></i>
                    </div>
                    <p class="text-gray-500 font-medium">No se encontraron usuarios</p>
                </td></tr>`;
            return;
        }
        tbody.innerHTML = users.map(renderRow).join('');
    } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="2" class="px-6 py-12 text-center text-red-500">Error al cargar usuarios</td></tr>`;
    }
}

async function resetPassword(userId, newPassword = 'mucunemi25') {
    const res = await fetch(`/api/v1/admin/users/${userId}/reset-password/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
        credentials: 'same-origin',
        body: JSON.stringify({ new_password: newPassword }),
    });
    return res.ok;
}

function confirmReset(userId, name) {
    if (typeof showConfirm === 'function') {
        showConfirm({
            title: 'Recuperar Clave',
            message: `Se reseteará la clave de ${name} a la clave por defecto.`,
            type: 'info',
            callback: async () => {
                const ok = await resetPassword(userId);
                if (ok && typeof showToast === 'function') showToast('Clave reseteada a mucunemi25', 'success');
                else if (typeof showToast === 'function') showToast('Error al resetear', 'error');
            },
        });
    } else if (confirm(`¿Resetear clave de ${name}?`)) {
        resetPassword(userId).then(ok => alert(ok ? 'Clave reseteada' : 'Error'));
    }
}

// Debounced search
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadUsers(e.target.value.trim()), 300);
});

loadUsers();
</script>
{% endblock %}
