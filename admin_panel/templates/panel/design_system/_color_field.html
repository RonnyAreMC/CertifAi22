{% comment %}
Atom · ColorField — input de color + caja hex sincronizada.
Args: name, label, value
{% endcomment %}
<div class="space-y-1.5">
    <label for="ds-{{ name }}" class="text-[10px] font-bold text-slate-600 dark:text-slate-300 uppercase tracking-wider">{{ label }}</label>
    <div class="flex items-center gap-2">
        <input type="color"
               id="ds-{{ name }}"
               name="{{ name }}"
               value="{{ value }}"
               class="w-10 h-10 rounded-lg cursor-pointer border border-slate-300 dark:border-white/10 bg-transparent">
        <input type="text"
               name="{{ name }}_hex"
               value="{{ value }}"
               data-hex-mirror="{{ name }}"
               maxlength="7"
               class="flex-1 min-w-0 ds-mono text-xs px-2 py-2 rounded-lg bg-white dark:bg-white/5 border border-slate-300 dark:border-white/10 text-slate-900 dark:text-slate-200 focus:outline-none focus:border-[var(--ds-brand)] focus:ring-2 focus:ring-[var(--ds-brand)]/20">
    </div>
</div>
