{% comment %}
Card de métrica del dashboard.
Args:
    id: id del span donde el JS pondrá el valor (ej: 'stat-certificados')
    icon: clase FA
    label: texto
    color: 'blue', 'orange', 'emerald', 'purple'
{% endcomment %}
{% with c=color|default:"blue" %}
<div class="relative overflow-hidden bg-white dark:bg-[#162054] p-5 rounded-2xl shadow-md border border-gray-100 dark:border-blue-900/30 hover:shadow-lg hover:-translate-y-0.5 transition-all group">
    <!-- Decoración esquina -->
    <div class="absolute -top-6 -right-6 w-24 h-24 rounded-full
        {% if c == 'blue' %}bg-blue-500/10
        {% elif c == 'orange' %}bg-[#F58830]/10
        {% elif c == 'emerald' %}bg-emerald-500/10
        {% elif c == 'purple' %}bg-purple-500/10
        {% endif %}
        group-hover:scale-150 transition-transform duration-500"></div>

    <div class="relative">
        <div class="flex items-center justify-between mb-3">
            <div class="w-11 h-11 rounded-xl
                {% if c == 'blue' %}bg-gradient-to-br from-blue-500 to-blue-700
                {% elif c == 'orange' %}bg-gradient-to-br from-[#F58830] to-[#D97520]
                {% elif c == 'emerald' %}bg-gradient-to-br from-emerald-500 to-emerald-700
                {% elif c == 'purple' %}bg-gradient-to-br from-purple-500 to-purple-700
                {% endif %}
                flex items-center justify-center text-white shadow-md">
                <i class="fa-solid {{ icon }} text-base"></i>
            </div>
        </div>
        <p id="{{ id }}" class="text-3xl font-black text-gray-900 dark:text-white leading-none mb-1">—</p>
        <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">{{ label }}</p>
    </div>
</div>
{% endwith %}
