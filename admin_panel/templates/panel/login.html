{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UNEMI Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        unemi: {
                            blue: '#162054',
                            orange: '#F58830',
                            dark: '#0B1221'
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-900 via-[#162054] to-black min-h-screen flex items-center justify-center overflow-hidden">
    
    <!-- Abstract Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-unemi-orange/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px]"></div>
    </div>

    <!-- Login Card -->
    <div class="relative w-full max-w-md p-6 z-10">
        <div class="glass rounded-2xl shadow-2xl p-8 transform transition-all hover:scale-[1.01] duration-500">
            <div class="flex flex-col items-center mb-8">
                <!-- Using the new logo -->
                <img src="{% static 'logo_unemi.png' %}" alt="UNEMI Logo" class="h-20 mb-4 drop-shadow-xl transition-transform hover:rotate-3 duration-500">
                <h1 class="text-3xl font-bold text-white tracking-wide text-center">UNEMI <span class="text-unemi-orange">Certificados</span></h1>
                <p class="text-blue-200 text-sm mt-2 font-light">Acceso Administrativo</p>
            </div>

            <form action="" method="post" class="space-y-6">
                {% csrf_token %}
                
                <div class="group">
                    <label for="username" class="block text-gray-300 text-xs font-bold uppercase tracking-wider mb-2 pl-1">Usuario</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 group-focus-within:text-unemi-orange transition-colors">
                            <i class="fa-solid fa-user"></i>
                        </span>
                        <input type="text" name="username" id="username" required 
                            class="w-full bg-black/30 border border-gray-600 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-unemi-orange focus:ring-1 focus:ring-unemi-orange placeholder-gray-500 transition-all font-light"
                            placeholder="Ingrese su usuario">
                    </div>
                </div>

                <div class="group">
                    <label for="password" class="block text-gray-300 text-xs font-bold uppercase tracking-wider mb-2 pl-1">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 group-focus-within:text-unemi-orange transition-colors">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" name="password" id="password" required
                            class="w-full bg-black/30 border border-gray-600 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-unemi-orange focus:ring-1 focus:ring-unemi-orange placeholder-gray-500 transition-all font-light"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-400 cursor-pointer hover:text-white transition-colors">
                        <input type="checkbox" name="remember" id="remember" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-unemi-orange focus:ring-unemi-orange focus:ring-offset-gray-800">
                        <span class="ml-2">Recordarme</span>
                    </label>
                    <a href="#" class="text-unemi-orange hover:text-orange-300 font-medium transition-colors">¿Olvidó su clave?</a>
                </div>

                <button type="submit" 
                    class="w-full bg-gradient-to-r from-unemi-orange to-orange-600 hover:from-orange-500 hover:to-orange-700 text-white font-bold py-3.5 rounded-lg shadow-lg hover:shadow-orange-500/30 transform hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center group">
                    INGRESAR
                    <i class="fa-solid fa-arrow-right-to-bracket ml-2 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>
        </div>
        
        <div class="text-center mt-6">
            <p class="text-gray-500 text-xs font-light tracking-wide">Universidad Estatal de Milagro &copy; 2026</p>
        </div>
    </div>
</body>
</html>
