# Stack completo de desarrollo local · web Django + DB Postgres + Redis (cache + Celery broker)
# Uso:
#   docker compose up         # primer plano
#   docker compose up -d      # background
#   docker compose logs -f web
#   docker compose exec web python manage.py migrate
#
# El worker de Celery + beat scheduler corren en sus propios containers.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       certifai
      POSTGRES_USER:     certifai
      POSTGRES_PASSWORD: certifai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U certifai -d certifai"]
      interval: 5s
      timeout:  5s
      retries:  10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  10

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60 --access-logfile -"
    environment:
      DEBUG:                 "False"
      SECRET_KEY:            ${SECRET_KEY:-dev-secret-change-me}
      ALLOWED_HOSTS:         "localhost,127.0.0.1,web"
      DATABASE_URL:          postgres://certifai:certifai@db:5432/certifai
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      # Google OAuth (sobreescribir desde .env)
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:  ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI:   ${GOOGLE_REDIRECT_URI:-http://localhost:8000/panel/google/callback/}
      GOOGLE_OAUTH_EMAIL:    ${GOOGLE_OAUTH_EMAIL:-}
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: .
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2
    environment:
      DEBUG:                 "False"
      SECRET_KEY:            ${SECRET_KEY:-dev-secret-change-me}
      DATABASE_URL:          postgres://certifai:certifai@db:5432/certifai
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:  ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_EMAIL:    ${GOOGLE_OAUTH_EMAIL:-}
    volumes:
      - ./media:/app/media
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }

  beat:
    build: .
    restart: unless-stopped
    command: celery -A config beat -l info --schedule=/tmp/celerybeat-schedule
    environment:
      DEBUG:                 "False"
      SECRET_KEY:            ${SECRET_KEY:-dev-secret-change-me}
      DATABASE_URL:          postgres://certifai:certifai@db:5432/certifai
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  pgdata:
