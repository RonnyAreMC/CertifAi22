{% extends 'public/account/_auth_shell.html' %}
{% block page_title %}Iniciar sesión{% endblock %}

{% block auth_content %}
<div class="auth-card-header">
    <span class="nm-disc nm-disc--brand nm-disc--sm">
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
    </span>
    <div>
        <h1 class="ds-display text-xl font-black text-slate-900 dark:text-white leading-tight">Bienvenido de vuelta</h1>
        <p class="text-xs text-slate-600 dark:text-slate-300 mt-0.5">Accede a tus certificados y eventos.</p>
    </div>
</div>

<form method="post" class="space-y-3">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">

    <div class="nm-input">
        <input type="email" name="email" placeholder="Correo electrónico" autocomplete="email" required value="{{ email|default:'' }}">
        <i class="fa-solid fa-envelope nm-icon"></i>
    </div>

    <div class="nm-input">
        <input type="password" name="password" placeholder="Contraseña" autocomplete="current-password" required>
        <i class="fa-solid fa-lock nm-icon"></i>
    </div>

    <button type="submit" class="nm-btn nm-btn-primary">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar
    </button>
</form>

<div class="mt-4 text-center text-sm text-slate-600 dark:text-slate-300">
    ¿No tienes cuenta?
    <a href="{% url 'public:account_register' %}" class="font-bold text-[var(--ds-brand)] hover:underline">Regístrate</a>
</div>

<div class="nm-divider">o continúa con</div>

<a href="{% url 'public:account_google_start' %}{% if next %}?next={{ next }}{% endif %}" class="nm-btn nm-btn-google">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Google
</a>
{% endblock %}
