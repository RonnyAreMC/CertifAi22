# Config mínima de ruff para CI
line-length = 120
target-version = "py310"

exclude = [
    ".venv",
    "migrations",
    "staticfiles",
    "media",
]

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # bugbear
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # function calls in argument defaults (common in Django)
]

[lint.per-file-ignores]
"tests/*" = ["F401"]  # unused imports ok in test fixtures
"**/__init__.py" = ["F401"]  # re-exports
